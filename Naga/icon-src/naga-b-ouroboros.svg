<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgB" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1A2540"/>
      <stop offset="60%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#060A17"/>
    </radialGradient>
    <linearGradient id="bodyB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3FF5C0"/>
      <stop offset="40%" stop-color="#2DD4AA"/>
      <stop offset="100%" stop-color="#148B6B"/>
    </linearGradient>
    <linearGradient id="bodyBBottom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A9D75"/>
      <stop offset="100%" stop-color="#2DD4AA"/>
    </linearGradient>
    <radialGradient id="nodeB" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF0B8"/>
      <stop offset="55%" stop-color="#F5B642"/>
      <stop offset="100%" stop-color="#8F5A14"/>
    </radialGradient>
    <linearGradient id="headBodyB" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#5FF7C8"/>
      <stop offset="100%" stop-color="#1E9C7A"/>
    </linearGradient>
  </defs>

  <!-- Rounded square bg -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#bgB)"/>

  <!-- Faint radial glow behind ring -->
  <circle cx="512" cy="512" r="340" fill="#2DD4AA" opacity="0.08"/>

  <!-- OUROBOROS: serpent body coiled in circle, thick stroke -->
  <!-- Main body circle (with gap at top where head meets tail) -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="url(#bodyB)" stroke-width="80" stroke-linecap="round" stroke-dasharray="1820 190" transform="rotate(-93 512 512)"/>

  <!-- Secondary highlight on body (upper-left lit) -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="#5FF7C8" stroke-width="14" stroke-linecap="round" stroke-dasharray="900 1110" opacity="0.35" transform="rotate(-60 512 512)"/>

  <!-- Scale pattern along back of body (chevrons radially distributed) -->
  <g fill="none" stroke="#082018" stroke-width="3.5" opacity="0.55" stroke-linecap="round">
    <g transform="translate(512 512)">
      <!-- generate 24 chevrons around the ring -->
      <g><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(15)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(30)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(45)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(60)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(75)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(90)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(105)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(120)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(135)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(150)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(165)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(195)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(210)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(225)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(240)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(255)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(270)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(285)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(300)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(315)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(330)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
      <g transform="rotate(345)"><path d="M -14 -320 Q 0 -315 14 -320"/></g>
    </g>
  </g>

  <!-- Tapered tail near top-left (where head will bite) -->
  <path d="M 430 205 Q 465 200 492 200" stroke="url(#bodyBBottom)" stroke-width="26" stroke-linecap="round" fill="none"/>
  <path d="M 410 202 Q 425 198 440 200" stroke="url(#bodyBBottom)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- COBRA HEAD at top center, slight tilt toward tail -->
  <g transform="translate(0 0)">
    <!-- Hood flare behind head -->
    <path d="M 440 180 Q 512 130 584 180 Q 580 260 512 285 Q 444 260 440 180 Z"
          fill="url(#bodyB)" stroke="#082018" stroke-width="4"/>
    <!-- Inner hood panel -->
    <path d="M 460 188 Q 512 148 564 188 Q 560 250 512 270 Q 464 250 460 188 Z"
          fill="url(#headBodyB)"/>
    <!-- Hood mesh ornament -->
    <g opacity="0.5" stroke="#082018" stroke-width="1.8" fill="none">
      <line x1="490" y1="205" x2="512" y2="190"/>
      <line x1="534" y1="205" x2="512" y2="190"/>
      <line x1="490" y1="205" x2="534" y2="205"/>
      <line x1="478" y1="230" x2="546" y2="230"/>
      <line x1="490" y1="205" x2="478" y2="230"/>
      <line x1="534" y1="205" x2="546" y2="230"/>
    </g>
    <g fill="#F5B642">
      <circle cx="512" cy="190" r="3"/>
      <circle cx="490" cy="205" r="2.5"/>
      <circle cx="534" cy="205" r="2.5"/>
      <circle cx="478" cy="230" r="2.5"/>
      <circle cx="546" cy="230" r="2.5"/>
    </g>
    <!-- Head shape -->
    <path d="M 482 200 Q 512 155 542 200 Q 538 245 512 262 Q 486 245 482 200 Z"
          fill="url(#headBodyB)" stroke="#082018" stroke-width="3"/>
    <!-- Eyes -->
    <g>
      <circle cx="498" cy="205" r="7" fill="#082018"/>
      <circle cx="526" cy="205" r="7" fill="#082018"/>
      <circle cx="500" cy="202" r="2" fill="#FFF7DC"/>
      <circle cx="528" cy="202" r="2" fill="#FFF7DC"/>
    </g>
    <!-- Forked tongue reaching toward tail -->
    <path d="M 512 262 Q 495 275 488 285 M 512 262 Q 477 270 460 265 M 485 282 L 480 290 M 488 267 L 482 270"
          stroke="#F5B642" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Jewel (mani) on forehead -->
    <circle cx="512" cy="168" r="16" fill="url(#nodeB)" stroke="#082018" stroke-width="2.5"/>
    <ellipse cx="507" cy="163" rx="5" ry="3.5" fill="#FFF0B8" opacity="0.9"/>
  </g>

  <!-- Inside the ring: 3 glowing cluster nodes in triangle -->
  <g>
    <!-- connection lines with glow -->
    <line x1="512" y1="390" x2="390" y2="590" stroke="#F5B642" stroke-width="5" opacity="0.6" stroke-linecap="round"/>
    <line x1="512" y1="390" x2="634" y2="590" stroke="#F5B642" stroke-width="5" opacity="0.6" stroke-linecap="round"/>
    <line x1="390" y1="590" x2="634" y2="590" stroke="#F5B642" stroke-width="5" opacity="0.6" stroke-linecap="round"/>
    <!-- 3 nodes -->
    <circle cx="512" cy="390" r="30" fill="url(#nodeB)" stroke="#082018" stroke-width="3"/>
    <circle cx="390" cy="590" r="30" fill="url(#nodeB)" stroke="#082018" stroke-width="3"/>
    <circle cx="634" cy="590" r="30" fill="url(#nodeB)" stroke="#082018" stroke-width="3"/>
    <!-- node highlights -->
    <ellipse cx="506" cy="382" rx="8" ry="5" fill="#FFF0B8" opacity="0.85"/>
    <ellipse cx="384" cy="582" rx="8" ry="5" fill="#FFF0B8" opacity="0.85"/>
    <ellipse cx="628" cy="582" rx="8" ry="5" fill="#FFF0B8" opacity="0.85"/>
    <!-- central small node (orchestration hub) -->
    <circle cx="512" cy="525" r="10" fill="#F5B642" stroke="#082018" stroke-width="1.5"/>
    <line x1="512" y1="525" x2="512" y2="390" stroke="#F5B642" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 5"/>
    <line x1="512" y1="525" x2="390" y2="590" stroke="#F5B642" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 5"/>
    <line x1="512" y1="525" x2="634" y2="590" stroke="#F5B642" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 5"/>
  </g>
</svg>
